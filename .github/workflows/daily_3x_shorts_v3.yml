# .github/workflows/daily_3x_shorts_v3.yml
# ══════════════════════════════════════════════════════════
#  GitHub Actions — 3x Daily Kids Shorts (Zero Cost)
#  Matches pipeline_v3.py exactly
# ══════════════════════════════════════════════════════════
#
#  SCHEDULE (US Eastern → UTC):
#    Slot 1 · 8:00 AM EST  → 13:00 UTC · Animal Facts
#    Slot 2 · 3:00 PM EST  → 20:00 UTC · Dinosaur Facts
#    Slot 3 · 7:00 PM EST  → 00:00 UTC · Ocean Animals
#
#  SECRETS NEEDED (GitHub → Settings → Secrets → Actions):
#    GROQ_API_KEY         → from console.groq.com (free, no card)
#    YOUTUBE_TOKEN_B64    → base64 encoded youtube_token.pickle
#    YOUTUBE_CLIENT_B64   → base64 encoded client_secrets.json
#
#  HOW TO ENCODE ON WINDOWS (run in Command Prompt):
#    certutil -encode youtube_token.pickle token_b64.txt
#    certutil -encode client_secrets.json  client_b64.txt
#    Open each .txt file → copy text between BEGIN/END lines
# ══════════════════════════════════════════════════════════

name: Kids Shorts — 3x Daily (Zero Cost)

on:
  schedule:
    - cron: "0 13 * * *"    # Slot 1 → 8:00 AM EST
    - cron: "0 20 * * *"    # Slot 2 → 3:00 PM EST
    - cron: "0 0  * * *"    # Slot 3 → 7:00 PM EST
  workflow_dispatch:
    inputs:
      slot:
        description: "Which slot to run (1=8AM Animal, 2=3PM Dino, 3=7PM Ocean)"
        required: true
        default: "1"
        type: choice
        options: ["1", "2", "3"]

jobs:

  # ── SLOT 1 — 8:00 AM EST · Animal Facts ──────────────────
  slot-1:
    name: "Slot 1 · 8AM EST · Animal Facts"
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 13 * * *')
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.slot == '1')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --quiet \
            groq \
            gtts \
            pytrends \
            requests \
            pytz \
            google-api-python-client \
            google-auth-oauthlib \
            Pillow

      - name: Run Slot 1 — Animal Facts
        env:
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          YT_REFRESH_TOKEN:  ${{ secrets.YT_REFRESH_TOKEN }}
          YT_CLIENT_ID:      ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:  ${{ secrets.YT_CLIENT_SECRET }}
        run: python pipeline_v3.py --slot 1

      - name: Run Slot 1 — Animal Facts
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python pipeline_v3.py --slot 1

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slot1-logs-${{ github.run_number }}
          path: |
            output/slot_1/script_seo.json
            output/upload_log.jsonl
          retention-days: 7

  # ── SLOT 2 — 3:00 PM EST · Dinosaur Facts ────────────────
  slot-2:
    name: "Slot 2 · 3PM EST · Dinosaur Facts"
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 20 * * *')
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.slot == '2')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --quiet \
            groq \
            gtts \
            pytrends \
            requests \
            pytz \
            google-api-python-client \
            google-auth-oauthlib \
            Pillow

      - name: Run Slot 2 — Animal Facts
        env:
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          YT_REFRESH_TOKEN:  ${{ secrets.YT_REFRESH_TOKEN }}
          YT_CLIENT_ID:      ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:  ${{ secrets.YT_CLIENT_SECRET }}
        run: python pipeline_v3.py --slot 2

      - name: Run Slot 2 — Dinosaur Facts
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python pipeline_v3.py --slot 2

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slot2-logs-${{ github.run_number }}
          path: |
            output/slot_2/script_seo.json
            output/upload_log.jsonl
          retention-days: 7

  # ── SLOT 3 — 7:00 PM EST · Ocean Animals ─────────────────
  slot-3:
    name: "Slot 3 · 7PM EST · Ocean Animals"
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 0 * * *')
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.slot == '3')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --quiet \
            groq \
            gtts \
            pytrends \
            requests \
            pytz \
            google-api-python-client \
            google-auth-oauthlib \
            Pillow

      - name: Run Slot 3 — Animal Facts
        env:
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          YT_REFRESH_TOKEN:  ${{ secrets.YT_REFRESH_TOKEN }}
          YT_CLIENT_ID:      ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:  ${{ secrets.YT_CLIENT_SECRET }}
        run: python pipeline_v3.py --slot 3

      - name: Run Slot 3 — Ocean Animals
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python pipeline_v3.py --slot 3

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slot3-logs-${{ github.run_number }}
          path: |
            output/slot_3/script_seo.json
            output/upload_log.jsonl
          retention-days: 7
