# .github/workflows/daily_2x_shorts_v5.yml
# ══════════════════════════════════════════════════════════
#  GitHub Actions — 2x Daily Kids Shorts v5
#  Real 2D Manim Animation · Music Only · No Voiceover
# ══════════════════════════════════════════════════════════
#
#  SCHEDULE:
#    Slot 1 · 9:00 AM EST  → 14:00 UTC · Animal Facts
#    Slot 2 · 6:00 PM EST  → 23:00 UTC · Dinosaur Facts
#
#  SECRETS NEEDED:
#    GROQ_API_KEY       → console.groq.com
#    YT_REFRESH_TOKEN   → from get_youtube_token.py
#    YT_CLIENT_ID       → from get_youtube_token.py
#    YT_CLIENT_SECRET   → from get_youtube_token.py
# ══════════════════════════════════════════════════════════

name: Kids Shorts v5 — 2x Daily Manim

on:
  schedule:
    - cron: "0 14 * * *"    # Slot 1 → 9:00 AM EST
    - cron: "0 23 * * *"    # Slot 2 → 6:00 PM EST
  workflow_dispatch:
    inputs:
      slot:
        description: "Slot (1=9AM Animal Facts, 2=6PM Dinosaur Facts)"
        required: true
        default: "1"
        type: choice
        options: ["1", "2"]

jobs:

  slot-1:
    name: "Slot 1 · 9AM EST · Animal Facts"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 14 * * *')
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.slot == '1')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (Manim needs these)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            libcairo2-dev \
            libpango1.0-dev \
            pkg-config \
            python3-dev

      - name: Install Python dependencies
        run: |
          pip install --quiet \
            manim \
            groq \
            pytrends \
            requests \
            pytz \
            google-api-python-client \
            google-auth-oauthlib \
            Pillow

      - name: Run Slot 1 — Animal Facts
        env:
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_CLIENT_ID:     ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
        run: python pipeline_v5.py --slot 1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: slot1-v5-${{ github.run_number }}
          path: output/upload_log.jsonl
          retention-days: 7

  slot-2:
    name: "Slot 2 · 6PM EST · Dinosaur Facts"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 23 * * *')
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.slot == '2')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            libcairo2-dev \
            libpango1.0-dev \
            pkg-config \
            python3-dev

      - name: Install Python dependencies
        run: |
          pip install --quiet \
            manim \
            groq \
            pytrends \
            requests \
            pytz \
            google-api-python-client \
            google-auth-oauthlib \
            Pillow

      - name: Run Slot 2 — Dinosaur Facts
        env:
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_CLIENT_ID:     ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
        run: python pipeline_v5.py --slot 2

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: slot2-v5-${{ github.run_number }}
          path: output/upload_log.jsonl
          retention-days: 7
